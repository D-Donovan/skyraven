name: Stamp version

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: stamp-version
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Write version into sw.js
        run: |
          set -euxo pipefail
          test -f sw.js || { echo "sw.js not found in $(pwd)"; ls -la; exit 1; }
          VERSION="$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          echo "Stamping version: $VERSION"
          sed -i -E 's|(const CACHE = "skyraven-v)[^"]*(")|\1'"${VERSION}"'\2|' sw.js
          grep -F 'const CACHE' sw.js

      - name: Commit if changed
        run: |
          if git diff --quiet -- sw.js; then
            echo "sw.js version unchanged; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git commit -m "chore: stamp version"
          git push
